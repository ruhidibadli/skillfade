<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Hanken+Grotesk:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap');
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 1200px; height: 630px; }
      body {
        font-family: 'Hanken Grotesk', system-ui, sans-serif;
        background-color: #1A150E;
        background-image:
          radial-gradient(at 12% 10%, rgba(143,179,130,0.14) 0px, transparent 45%),
          radial-gradient(at 88% 12%, rgba(200,121,90,0.13) 0px, transparent 45%),
          radial-gradient(at 50% 100%, rgba(201,162,78,0.08) 0px, transparent 55%);
        color: #F4ECDD;
        position: relative;
        overflow: hidden;
      }
      .frame {
        position: absolute;
        inset: 56px;
        border: 1px solid #392F20;
        border-radius: 24px;
      }
      .content {
        position: absolute;
        inset: 56px;
        padding: 72px 80px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }
      .brand { display: flex; align-items: center; gap: 20px; }
      .chip {
        width: 76px; height: 76px; border-radius: 18px;
        background: linear-gradient(135deg, #8FB382 0%, #C8795A 100%);
        display: flex; align-items: center; justify-content: center;
      }
      .wordmark { font-family: 'Fraunces', serif; font-weight: 600; font-size: 44px; letter-spacing: -0.01em; }
      .beta {
        font-size: 16px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase;
        color: #8FB382; border: 1px solid rgba(143,179,130,0.3); background: rgba(143,179,130,0.1);
        padding: 6px 12px; border-radius: 999px; margin-left: 4px;
      }
      h1 {
        font-family: 'Fraunces', serif; font-weight: 600; font-size: 76px; line-height: 1.04;
        letter-spacing: -0.02em; max-width: 880px; margin-bottom: 28px;
      }
      .accent { color: #8FB382; }
      .sub { font-size: 30px; line-height: 1.45; color: #C7B9A2; max-width: 820px; }
      .foot { display: flex; align-items: center; justify-content: space-between; }
      .url { font-family: 'IBM Plex Mono', monospace; font-size: 24px; color: #9C8E76; letter-spacing: 0.02em; }
      .tagline { font-size: 24px; color: #9C8E76; font-style: italic; }
      .bars { position: absolute; right: 90px; bottom: 190px; display: flex; align-items: flex-end; gap: 14px; opacity: 0.9; }
      .bar { width: 30px; border-radius: 8px; }
      .b1 { height: 150px; background: linear-gradient(180deg, #A7D08C, #7DA86A); }
      .b2 { height: 104px; background: linear-gradient(180deg, #E4C173, #C9A24E); }
      .b3 { height: 64px; background: linear-gradient(180deg, #DDA08C, #C87B64); }
    </style>
  </head>
  <body>
    <div class="frame"></div>
    <div class="bars">
      <div class="bar b1"></div>
      <div class="bar b2"></div>
      <div class="bar b3"></div>
    </div>
    <div class="content">
      <div class="brand">
        <div class="chip">
          <svg width="44" height="44" viewBox="0 0 24 24" fill="#14100A" xmlns="http://www.w3.org/2000/svg">
            <rect x="3" y="4" width="5" height="16" rx="1.5" opacity="1"/>
            <rect x="9.5" y="8" width="5" height="12" rx="1.5" opacity="0.7"/>
            <rect x="16" y="12" width="5" height="8" rx="1.5" opacity="0.4"/>
          </svg>
        </div>
        <span class="wordmark">SkillFade</span>
        <span class="beta">Beta</span>
      </div>

      <div>
        <h1>Track skill decay &amp;<br />learning <span class="accent">balance</span>.</h1>
        <p class="sub">A calm tracker for developers and self-directed learners — see which skills are fading, before it costs you.</p>
      </div>

      <div class="foot">
        <span class="url">skillfade.website</span>
        <span class="tagline">A mirror, not a coach.</span>
      </div>
    </div>
  </body>
</html>
