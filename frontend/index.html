<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/pwa-192x192.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Fonts: preconnect + non-render-blocking load (moved out of a CSS @import). -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Hanken+Grotesk:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" />

    <!-- Primary Meta Tags -->
    <title>SkillFade - Track Skill Decay and Learning Balance</title>
    <meta name="title" content="SkillFade - Track Skill Decay and Learning Balance" />
    <meta name="description" content="SkillFade is a skill decay tracking application for developers and self-directed learners. Track learning decay, practice scarcity, and input/output imbalance. A calm mirror, not a coach. Free and open source." />

    <!-- Google Search Console verification -->
    <meta name="google-site-verification" content="dAQgMIpPclGzzEYBrPMV7zF-OHkKRtbqawB3eB4Tp14" />

    <!-- Google Analytics 4 (Consent Mode v2; default denied until user accepts cookie banner) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-31B1MG861C"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('consent', 'default', {
        ad_storage: 'denied',
        ad_user_data: 'denied',
        ad_personalization: 'denied',
        analytics_storage: 'denied',
        wait_for_update: 500
      });
      try {
        if (localStorage.getItem('analytics_consent') === 'granted') {
          gtag('consent', 'update', { analytics_storage: 'granted' });
        }
      } catch (e) {}
      gtag('js', new Date());
      gtag('config', 'G-31B1MG861C', {
        anonymize_ip: true,
        send_page_view: false
      });
    </script>

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://skillfade.website/" />
    <meta property="og:title" content="SkillFade - Track Skill Decay and Learning Balance" />
    <meta property="og:description" content="SkillFade is a skill decay tracking application for developers and self-directed learners. Track learning decay, practice scarcity, and input/output imbalance. A calm mirror, not a coach." />
    <meta property="og:image" content="https://skillfade.website/og-image.png" />
    <meta property="og:site_name" content="SkillFade" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://skillfade.website/" />
    <meta name="twitter:title" content="SkillFade - Track Skill Decay and Learning Balance" />
    <meta name="twitter:description" content="SkillFade is a skill decay tracking application for developers and self-directed learners. Track learning decay, practice scarcity, and input/output imbalance." />
    <meta name="twitter:image" content="https://skillfade.website/og-image.png" />

    <!-- RSS feed autodiscovery (blog) -->
    <link rel="alternate" type="application/rss+xml" title="SkillFade Blog" href="/rss.xml" />

    <!-- PWA / Mobile -->
    <meta name="theme-color" content="#1A150E" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SkillFade" />

    <!-- Baseline Structured Data (enhanced per-page by React) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "SkillFade",
      "url": "https://skillfade.website",
      "description": "SkillFade is a skill decay tracking application for developers and self-directed learners. Track learning decay, practice scarcity, and input/output imbalance."
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "SkillFade",
      "url": "https://skillfade.website",
      "logo": "https://skillfade.website/logo.svg",
      "description": "SkillFade helps developers and self-directed learners track skill decay, practice scarcity, and input/output imbalance. A calm mirror, not a coach."
    }
    </script>
    <!-- SoftwareApplication schema is emitted per-route by React (Landing/Features) so it
         doesn't leak onto blog/FAQ pages where it doesn't belong. -->

  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
