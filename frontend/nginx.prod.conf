server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript;

    # Service worker and PWA control files must never be cached.
    # Exact-match locations (=) win over regex locations, so these override the
    # static-asset rule below.
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        expires off;
        access_log off;
    }

    location = /registerSW.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        expires off;
    }

    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        expires off;
    }

    # Hashed static assets (Vite emits content-hashed filenames) - safe to pin forever
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA routing - HTML must never be cached so users always see new bundle hashes
    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        expires off;
        try_files $uri $uri/ /index.html;
    }
}
