# Upstream definitions
upstream backend {
    server backend:8000;
}

upstream frontend {
    server frontend:80;
}


# HTTP - redirect to HTTPS
server {
    listen 80;
    server_name skillfade.website;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    http2 on;
    server_name skillfade.website;

    ssl_certificate /etc/letsencrypt/live/skillfade.website/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/skillfade.website/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    # HSTS: force HTTPS for 2 years. NOTE: no `includeSubDomains` — only add that once
    # every subdomain of skillfade.website is confirmed HTTPS-only (it is sticky/hard to undo).
    add_header Strict-Transport-Security "max-age=63072000" always;

    location /api {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://backend/health;
    }

    location /docs {
        proxy_pass http://backend/docs;
    }

    location /openapi.json {
        proxy_pass http://backend/openapi.json;
    }

    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
